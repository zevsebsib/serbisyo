name: serbisyo_alisto
description: SerbisyoAlisto - Municipal Service Request mobile app for City of Laoag
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=2.18.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & animations
  flutter_animate: ^4.5.0
  animations: ^2.0.6
  shimmer: ^3.0.0

  # Icons & fonts
  lucide_icons: ^0.257.0
  google_fonts: ^8.0.2
  flutter_svg: ^2.0.7

  # State & navigation
  provider: ^6.0.5

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.1
  firebase_messaging: ^16.1.1

  # Charts
  fl_chart: ^0.68.0

  # File & links
  file_picker: ^8.1.2
  url_launcher: ^6.3.2
  google_sign_in: ^6.2.1
  http: ^1.2.0
  flutter_to_pdf: ^0.4.1
  pdf: ^3.12.0
  path_provider: ^2.1.5
  open_file: ^3.5.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.jpg
    - assets/serbisyo.png
    - assets/serbisyologo.png